<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Banana | Coming Soon</title>
    <style>
        body {
            background-color: #fef3c7; /* Soft banana yellow */
            color: #422006; /* Deep banana-stem brown */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        /* The Logo Styling */
        .logo {
            max-width: 200px; /* Adjust this size as needed */
            height: auto;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            margin: 10px 0;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .tagline {
            font-weight: bold;
            color: #b45309;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Your Logo -->
        <img src="files/images/logo.png" alt="Vision Banana Logo" class="logo">
        
        <h1>Vision Banana</h1>
        <h2>arXiv:???</h2>
    </div>

</body>
</html>
